<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Conviction — Claude's Picks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#10131A; --surf:#181B24; --surf2:#1F2430; --line:#2A2F3C; --line2:#363C4A;
    --tx:#D6DAE3; --tx2:#8B92A4; --tx3:#5C6373;
    --up:#26A69A; --up-dim:#16413E; --down:#EF5350; --down-dim:#46201F; --flat:#3A4150;
    --buy:#26A69A; --wait:#F2A33C; --avoid:#EF5350; --gold:#C7A35A;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:14px;
    line-height:1.45;-webkit-font-smoothing:antialiased;padding-bottom:70px}
  .wrap{max-width:1060px;margin:0 auto;padding:0 20px}

  /* Topbar */
  .top{display:flex;align-items:baseline;justify-content:space-between;gap:16px;
    padding:26px 20px 16px;max-width:1060px;margin:0 auto;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:baseline;gap:12px}
  .brand b{font-size:21px;font-weight:700;letter-spacing:-.02em}
  .brand .sub{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:600}
  .top .meta{font-size:12px;color:var(--tx2)}
  .top .meta b{color:var(--tx);font-weight:600}
  .intro{max-width:1060px;margin:14px auto 0;padding:0 20px;font-size:13px;color:var(--tx2);line-height:1.55}

  /* Heatmap tiles */
  .heat{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:22px 0 6px}
  .tile{position:relative;border-radius:8px;padding:14px 15px;min-height:104px;
    border:1px solid var(--line2);cursor:default;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between}
  .tile.up{background:linear-gradient(135deg,var(--up-dim),#10131A 120%)}
  .tile.down{background:linear-gradient(135deg,var(--down-dim),#10131A 120%)}
  .tile.flat{background:var(--surf2)}
  .tile .h{display:flex;align-items:center;gap:9px}
  .logo{width:30px;height:30px;border-radius:6px;background:#fff;object-fit:contain;flex:none}
  .logo.ph{display:flex;align-items:center;justify-content:center;background:var(--surf2);
    color:var(--tx2);font-size:11px;font-weight:700;border:1px solid var(--line2)}
  .tile .tk{font-weight:700;font-size:16px;letter-spacing:-.01em}
  .tile .vb{margin-left:auto}
  .tile .px{font-size:23px;font-weight:600;letter-spacing:-.01em;font-variant-numeric:tabular-nums}
  .tile .ch{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
  .up .ch,.chg.up{color:var(--up)} .down .ch,.chg.down{color:var(--down)} .flat .ch{color:var(--tx2)}

  /* Verdict thumb */
  .thumb{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center}
  .thumb svg{width:15px;height:15px}
  .buy .thumb,.thumb.buy{background:rgba(38,166,154,.16)} .buy .thumb svg,.thumb.buy svg{fill:var(--buy)}
  .wait .thumb,.thumb.wait{background:rgba(242,163,60,.16)} .wait .thumb svg,.thumb.wait svg{fill:var(--wait)}
  .avoid .thumb,.thumb.avoid{background:rgba(239,83,80,.16)} .avoid .thumb svg,.thumb.avoid svg{fill:var(--avoid)}

  .legend{display:flex;gap:18px;flex-wrap:wrap;font-size:11.5px;color:var(--tx2);margin:14px 2px 2px;align-items:center}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend svg{width:14px;height:14px}

  /* Detail cards */
  .card{background:var(--surf);border:1px solid var(--line);border-radius:10px;margin-top:14px;overflow:hidden}
  .chead{display:flex;align-items:center;gap:13px;padding:16px 18px;border-bottom:1px solid var(--line)}
  .chead .name b{font-size:17px;font-weight:700;letter-spacing:-.01em}
  .chead .name .co{font-size:12px;color:var(--tx2)}
  .chead .pxwrap{margin-left:auto;text-align:right}
  .chead .pxwrap .p{font-size:22px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .chead .pxwrap .c{font-size:12.5px;font-weight:600;font-variant-numeric:tabular-nums}
  .chead .verdict{display:flex;align-items:center;gap:8px;padding-left:14px;border-left:1px solid var(--line)}
  .vlabel{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
  .buy .vlabel{color:var(--buy)} .wait .vlabel{color:var(--wait)} .avoid .vlabel{color:var(--avoid)}

  .cbody{padding:16px 18px}
  .tags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
  .tag{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;color:var(--tx2);
    padding:3px 9px;border-radius:5px;border:1px solid var(--line2);background:var(--surf2)}
  .tag.long{color:var(--gold);border-color:#4a3f24}
  .thesis{font-size:15.5px;line-height:1.45;margin-bottom:14px;color:var(--tx)}
  .conv{display:flex;align-items:center;gap:8px;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);margin-bottom:4px}
  .pips{display:flex;gap:4px}
  .pip{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--gold)}
  .pip.on{background:var(--gold)}

  .why{border-top:1px solid var(--line);margin-top:15px;padding-top:14px}
  .why h4{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px}
  .why li{display:flex;gap:11px;margin-bottom:9px;font-size:13px;line-height:1.5;color:var(--tx);list-style:none}
  .why .d{font-weight:600;font-size:11.5px;color:var(--tx3);white-space:nowrap;min-width:70px;font-variant-numeric:tabular-nums}
  .note{font-size:12.5px;color:var(--tx2);line-height:1.55;margin-top:12px;padding-left:12px;border-left:2px solid var(--line2)}

  .foot{display:flex;flex-wrap:wrap;gap:20px;border-top:1px solid var(--line);margin-top:15px;padding-top:13px}
  .lv .k{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);display:block;margin-bottom:3px}
  .lv .v{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums}
  .delta{margin-left:auto;text-align:right}
  .asof{font-size:11px;color:var(--tx3);margin-top:12px}
  .take{border-radius:8px;padding:13px 15px;margin:14px 0 4px;font-size:14.5px;line-height:1.52;border-left:3px solid;background:var(--surf2)}
  .take .tk-l{display:block;font-size:10px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;margin-bottom:6px}
  .take.buy{border-color:var(--buy)} .take.buy .tk-l{color:var(--buy)}
  .take.wait{border-color:var(--wait)} .take.wait .tk-l{color:var(--wait)}
  .take.avoid{border-color:var(--avoid)} .take.avoid .tk-l{color:var(--avoid)}
  .plan{border-top:1px solid var(--line);margin-top:15px;padding-top:14px}
  .plan-h{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:8px}
  .ent{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px dashed var(--line)}
  .ent .en{font-size:13px;color:var(--tx)} .ent .arr{color:var(--up);margin-right:8px;font-weight:700}
  .ent .ev{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
  .st{display:flex;gap:10px;margin-top:12px}
  .stbox{flex:1;border-radius:7px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center}
  .stbox.stop{background:var(--down-dim)} .stbox.tgt{background:var(--up-dim)}
  .stbox .sl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:600}
  .stbox.stop .sl{color:var(--down)} .stbox.tgt .sl{color:var(--up)}
  .stbox .sv{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
  .stbox.stop .sv{color:var(--down)} .stbox.tgt .sv{color:var(--up)}
  .foot2{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);margin-top:15px;padding-top:12px}
  .foot2 .k{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3)}
  .foot2 .chg{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums}

  .spark{flex:none;margin-left:auto;margin-right:16px}
  .chead .pxwrap{margin-left:0;text-align:right}
  .tape{position:fixed;left:0;right:0;bottom:0;height:44px;background:#0A0D13;border-top:1px solid var(--line);
    display:flex;align-items:center;gap:26px;padding:0 22px;overflow-x:auto;font-size:12.5px;z-index:50}
  .tape::-webkit-scrollbar{height:0}
  .tape .it{display:flex;align-items:center;gap:8px;white-space:nowrap;font-variant-numeric:tabular-nums}
  .tape .it .lb{color:var(--tx2)} .tape .it .pr{font-weight:600}
  .tape .it .cg{font-weight:600;font-size:11.5px}
  footer{max-width:1060px;margin:34px auto 0;padding:16px 20px 0;border-top:1px solid var(--line);
    font-size:11px;color:var(--tx3);text-align:center}
  @media(max-width:560px){.chead .pxwrap .p{font-size:18px}.spark{display:none}}
</style>
</head>
<body>
  <div class="top">
    <div class="brand"><b>Conviction</b><span class="sub">Claude's Picks</span></div>
    <div class="meta">Stand <b id="updated">—</b> · Kurse as-of, nicht live</div>
  </div>
  <p class="intro" id="intro"></p>
  <div class="wrap">
    <div class="heat" id="heat"></div>
    <div class="legend">
      <span><svg viewBox="0 0 24 24" style="fill:var(--buy)"><use href="#th-up"/></svg> Kaufen</span>
      <span><svg viewBox="0 0 24 24" style="fill:var(--wait)"><use href="#th-wait"/></svg> Abwarten</span>
      <span><svg viewBox="0 0 24 24" style="fill:var(--avoid)"><use href="#th-down"/></svg> Finger weg</span>
      <span style="margin-left:auto">Kachel-Farbe = Kurs seit Aufnahme · ● Conviction 1–5</span>
    </div>
    <div id="board"></div>
  </div>
  <footer>Diskretionäre Einschätzungen, kein Anlagerat. Kurse „as-of" letztem Update — nicht live. Δ trackt ab Aufnahme zur Selbstkontrolle.</footer>
  <div class="tape" id="tape"></div>

  <svg width="0" height="0" style="position:absolute">
    <symbol id="th-up" viewBox="0 0 24 24"><path d="M2 21h4V9H2v12zm20-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L13.17 1 6.59 7.59C6.22 7.95 6 8.45 6 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-1.91z"/></symbol>
    <symbol id="th-down" viewBox="0 0 24 24"><path d="M22 3h-4v12h4V3zM2 14c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L10.83 23l6.58-6.59c.37-.36.59-.86.59-1.41V5c0-1.1-.9-2-2-2H7c-.83 0-1.54.5-1.84 1.22L2.14 11.27c-.09.23-.14.47-.14.73v1.91z"/></symbol>
    <symbol id="th-wait" viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 18a8 8 0 110-16 8 8 0 010 16zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></symbol>
  </svg>

<script>
const VERDICT={buy:{l:"Kaufen",i:"th-up"},wait:{l:"Abwarten",i:"th-wait"},avoid:{l:"Finger weg",i:"th-down"}};
const logoURL=t=>`https://images.financialmodelingprep.com/symbol/${t}.png`;
function logo(t){return `<img class="logo" src="${logoURL(t)}" alt="" onerror="this.onerror=null;this.outerHTML='<span class=&quot;logo ph&quot;>${t.slice(0,3)}</span>'">`;}
function delta(p){const d=((p.current_price-p.ref_price)/p.ref_price*100);return {d,cls:d>0.05?'up':d<-0.05?'down':'flat',s:(d>=0?'+':'')+d.toFixed(2)+'%'};}
function pips(n){let h='<div class="pips">';for(let i=1;i<=5;i++)h+=`<div class="pip${i<=n?' on':''}"></div>`;return h+'</div>';}
function thumb(v){const x=VERDICT[v]||VERDICT.wait;return `<span class="thumb ${v}"><svg viewBox="0 0 24 24"><use href="#${x.i}"/></svg></span>`;}
function lvl(k,v){if(v==null||v===0||v==='—')return '';return `<div class="lv"><span class="k">${k}</span><span class="v">${typeof v==='number'?'$'+v.toFixed(2):v}</span></div>`;}
function spark(a){if(!a||a.length<2)return '';const w=108,h=34,mn=Math.min(...a),mx=Math.max(...a),r=(mx-mn)||1;
  const pts=a.map((v,i)=>`${(i/(a.length-1)*w).toFixed(1)},${(h-((v-mn)/r)*h*0.86-2).toFixed(1)}`).join(' ');
  const col=a[a.length-1]>=a[0]?'var(--up)':'var(--down)';
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;}
function tapeRow(t){const cls=t.chg>0?'up':t.chg<0?'down':'flat',s=(t.chg>=0?'+':'')+t.chg.toFixed(2)+'%';
  const pr=t.price>=1000?Math.round(t.price).toLocaleString('en-US'):t.price.toFixed(2);
  return `<div class="it"><span class="lb">${t.label}</span><span class="pr">${pr}</span><span class="cg chg ${cls}">${s}</span></div>`;}

function tile(p){const dl=delta(p);return `<div class="tile ${dl.cls}">
  <div class="h">${logo(p.ticker)}<span class="tk">${p.ticker}</span><span class="vb">${thumb(p.verdict)}</span></div>
  <div><div class="px">$${p.current_price.toFixed(2)}</div><div class="ch">${dl.s} <span style="color:var(--tx3);font-weight:500">seit Aufnahme</span></div></div>
</div>`;}

function card(p){const dl=delta(p),vd=VERDICT[p.verdict]||VERDICT.wait;
  const why=(p.why||[]).map(w=>`<li><span class="d">${w.date}</span><span>${w.text}</span></li>`).join('');
  const ent=(p.entries||[]).map(e=>`<div class="ent"><span class="en"><span class="arr">→</span>${e.label}</span><span class="ev">$${(+e.price).toFixed(2)}</span></div>`).join('');
  const plan=(ent||p.stop||p.target)?`<div class="plan">${ent?`<div class="plan-h">Entry-Optionen</div>${ent}`:''}
      <div class="st">${p.stop?`<div class="stbox stop"><span class="sl">Stop-Loss</span><span class="sv">$${(+p.stop).toFixed(2)}</span></div>`:''}${p.target?`<div class="stbox tgt"><span class="sl">Kursziel</span><span class="sv">$${(+p.target).toFixed(2)}</span></div>`:''}</div></div>`:'';
  return `<div class="card ${p.verdict}">
    <div class="chead">${logo(p.ticker)}
      <div class="name"><b>${p.ticker}</b><div class="co">${p.company}</div></div>
      ${spark(p.spark)}
      <div class="pxwrap"><div class="p">$${p.current_price.toFixed(2)}</div><div class="c chg ${dl.cls}">${dl.s}</div></div>
      <div class="verdict">${thumb(p.verdict)}<span class="vlabel">${vd.l}</span></div>
    </div>
    <div class="cbody">
      <div class="tags"><span class="tag ${p.horizon==='long'?'long':''}">${p.horizon==='long'?'Langfristig':'Swing'}</span><span class="tag">${p.sector||''}</span></div>
      <div class="thesis">${p.thesis}</div>
      ${p.take?`<div class="take ${p.verdict}"><span class="tk-l">Mein Take</span>${p.take}</div>`:''}
      <div class="conv">Conviction ${pips(p.conviction)}</div>
      <div class="why"><h4>Warum (die Fakten)</h4><ul>${why}</ul>${p.note?`<div class="note">${p.note}</div>`:''}</div>
      ${plan}
      <div class="foot2"><span class="k">seit Aufnahme ($${p.ref_price.toFixed(2)})</span><span class="chg ${dl.cls}">${dl.s}</span></div>
      <div class="asof">Aufgenommen ${p.added} · aktualisiert ${p.updated}</div>
    </div></div>`;}
