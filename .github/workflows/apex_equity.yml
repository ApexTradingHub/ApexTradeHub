name: ApexEquity Update

on:
  schedule:
    # Every 30 min during US market hours (13:00-21:00 UTC = 9-17 ET) for live equity tracking
    - cron: '*/30 13-21 * * 1-5'
    # Plus a few off-hours runs for EOD aggregation + early-morning state
    - cron: '0 6,22 * * 1-5'
  workflow_dispatch:

jobs:
  equity:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance pandas requests pytz tqdm matplotlib
      - name: Equity
        run: python apex_equity.py
      - name: Push
        run: |
          git config user.name "ApexScan Bot"
          git config user.email "bot@apexscan.com"
          git stash
          git pull origin master --rebase
          git stash pop
          git add apex_equity_results.json apex_equity_top2.json apex_market.json dashboard.html
          git diff --staged --quiet || git commit -m "Equity $(date +'%Y-%m-%d %H:%M')"
          git push