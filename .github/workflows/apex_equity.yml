name: ApexEquity Update

on:
  schedule:
    # Every 30 min during US market hours, off-peak slots (:05 :35)
    - cron: '5-59/30 13-21 * * 1-5'
    # Plus a few off-hours runs for EOD aggregation + early-morning state
    - cron: '7 6,22 * * 1-5'
  workflow_dispatch:

jobs:
  equity:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance pandas requests pytz tqdm matplotlib
      - name: Equity
        run: python apex_equity.py
      - name: Push
        run: |
          set +e
          git config user.name "ApexScan Bot"
          git config user.email "bot@apexscan.com"

          mkdir -p /tmp/eq
          for f in apex_equity_results.json apex_equity_top2.json apex_open_positions.json apex_market.json; do
            [ -f "$f" ] && cp "$f" "/tmp/eq/$f"
          done

          git checkout -- . 2>/dev/null
          git pull origin master --rebase

          for f in apex_equity_results.json apex_equity_top2.json apex_open_positions.json apex_market.json; do
            [ -f "/tmp/eq/$f" ] && cp "/tmp/eq/$f" "$f"
          done

          git add apex_equity_results.json apex_equity_top2.json apex_open_positions.json apex_market.json dashboard.html 2>/dev/null
          if git diff --staged --quiet; then
            echo "Keine Aenderungen."
            exit 0
          fi
          git commit -m "Equity $(date +'%Y-%m-%d %H:%M')"

          for attempt in 1 2 3 4 5; do
            if git push 2>&1; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed, retrying..."
            git pull origin master --rebase -X theirs 2>&1 || git rebase --abort 2>/dev/null
            sleep $((attempt * 3))
          done

          echo "Push failed after 5 attempts."
          exit 1