name: ApexScan Daily

on:
  schedule:
    - cron: '30 20 * * 1-5'   # 20:30 UTC = 22:30 CEST, nach US-Close (20:00 UTC), vor UTC-Rollover (00:00 UTC / 02:00 CEST)
  workflow_dispatch:

jobs:
  scanner:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance pandas requests pytz tqdm matplotlib
      - name: ApexScan
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ApexScan.py
      - name: Push
        run: |
          git config user.name "ApexScan Bot"
          git config user.email "bot@apexscan.com"
          git stash
          git pull origin master --rebase
          git stash pop
          git add apex_signals.json apex_equity_results.json apex_equity_top2.json apex_market.json dashboard.html
          git diff --staged --quiet || git commit -m "Scan $(date +'%Y-%m-%d %H:%M')"
          git push