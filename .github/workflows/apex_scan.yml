name: ApexScan Daily

on:
  schedule:
    - cron: '0 21 * * 1-5'    # Scanner: 23:00 Uhr deutsche Zeit
    - cron: '0 4,8,12,16,20 * * 1-5'  # Equity: 06:00, 10:00, 14:00, 18:00, 22:00
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies installieren
        run: |
          pip install yfinance pandas requests pytz tqdm matplotlib

      - name: ApexScan ausführen (nur 23:00)
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && contains(github.event.schedule, '0 21'))
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ApexScan.py

      - name: Equity Tracker ausführen
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python apex_equity.py

      - name: Ergebnisse pushen
        run: |
          git config user.name "ApexScan Bot"
          git config user.email "bot@apexscan.com"
          git add apex_signals.json apex_equity_results.json apex_equity_top2.json apex_market.json dashboard.html
          git diff --staged --quiet || git commit -m "Update $(date +'%Y-%m-%d %H:%M')"
          git push