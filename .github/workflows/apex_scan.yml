name: ApexScan Daily

on:
  schedule:
    - cron: '0 20 * * *'
    - cron: '0 4,6,8,10,12,14,16,18 * * *'
  workflow_dispatch:

jobs:
  scanner:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 20 * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance pandas requests pytz tqdm matplotlib
      - name: ApexScan
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ApexScan.py
      - name: Push
        run: |
          git config user.name "ApexScan Bot"
          git config user.email "bot@apexscan.com"
          git add apex_signals.json apex_equity_results.json apex_equity_top2.json apex_market.json dashboard.html
          git diff --staged --quiet || git commit -m "Scan $(date +'%Y-%m-%d %H:%M')"
          git push

  equity:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 4,6,8,10,12,14,16,18 * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance pandas requests pytz tqdm matplotlib
      - name: Equity
        run: python apex_equity.py
      - name: Push
        run: |
          git config user.name "ApexScan Bot"
          git config user.email "bot@apexscan.com"
          git add apex_equity_results.json apex_equity_top2.json apex_market.json dashboard.html
          git diff --staged --quiet || git commit -m "Equity $(date +'%Y-%m-%d %H:%M')"
          git push