name: ApexKnowledge Daily

on:
  schedule:
    # 06:47 UTC = 08:47 CEST. Off-peak slot (war :30 = GH-Throttle-Zone, lief mit
    # 2-6h Verzoegerung). Morgens nach naechtlichem Scan + Equity.
    - cron: '47 6 * * 1-5'
  workflow_dispatch:

jobs:
  knowledge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance pandas requests pytz tqdm matplotlib
      - name: ApexLearn
        run: python apex_learn.py
      - name: ApexPostmortem (Full mode — addet new closed trades + regen summary)
        run: python apex_postmortem.py
        # Full mode: scannt equity_results fuer neue closed trades, fetcht yfinance
        # news + market context, schreibt placeholder-Eintrag (claude_analysis leer)
        # in knowledge/trade_postmortems.json. claude_analysis wird manuell von
        # Claude via WebSearch/Bigdata-Skills geschrieben. Am Ende: summary regen.
      - name: Push
        run: |
          set +e
          git config user.name "ApexScan Bot"
          git config user.email "bot@apexscan.com"

          mkdir -p /tmp/kn
          cp -r knowledge /tmp/kn/ 2>/dev/null
          cp -r reports /tmp/kn/ 2>/dev/null

          git checkout -- . 2>/dev/null
          git pull origin master --rebase

          cp -r /tmp/kn/knowledge . 2>/dev/null
          cp -r /tmp/kn/reports . 2>/dev/null

          git add knowledge/apex_knowledge.json reports/learn_latest.md reports/learn_*.md reports/postmortem_summary.md 2>/dev/null
          if git diff --staged --quiet; then
            echo "Keine Aenderungen."
            exit 0
          fi
          git commit -m "Knowledge $(date +'%Y-%m-%d %H:%M')"

          for attempt in 1 2 3 4 5; do
            if git push 2>&1; then exit 0; fi
            echo "Push attempt $attempt failed, retrying..."
            git pull origin master --rebase -X theirs 2>&1 || git rebase --abort 2>/dev/null
            sleep $((attempt * 3))
          done
          exit 1
