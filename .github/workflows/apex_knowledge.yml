name: ApexKnowledge Daily

on:
  schedule:
    # 06:30 UTC = 08:30 CEST — morgens, nach naechtlichem Scan + Equity. Robust gegen
    # Scan-Verzoegerungen (User sah TG-Nachrichten bis 00:50 CEST = 22:50 UTC).
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

jobs:
  knowledge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance pandas requests pytz tqdm matplotlib
      - name: ApexLearn
        run: python apex_learn.py
      - name: ApexPostmortem Summary
        run: python apex_postmortem.py --summary
      - name: Push
        run: |
          git config user.name "ApexScan Bot"
          git config user.email "bot@apexscan.com"
          git stash
          git pull origin master --rebase || true
          git stash pop || true
          git add knowledge/apex_knowledge.json reports/learn_latest.md reports/learn_*.md reports/postmortem_summary.md
          git diff --staged --quiet || git commit -m "Knowledge $(date +'%Y-%m-%d %H:%M')"
          git push
